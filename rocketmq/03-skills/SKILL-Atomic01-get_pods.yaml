# RocketMQ 原子技能：获取 Pod 列表
skill:
  # 技能名称：用于获取 RocketMQ 各组件的 Pod 列表
  name: get_rocketmq_pods
  
  # 技能版本号
  version: "1.0"
  
  # 技能类型：atomic 表示原子技能（基础技能，不可再分）
  type: atomic

  # 技能描述：底层原子技能，供其他 SOP 技能内部调用
  description: |
    [内部原子技能] 直接调用 kubectl_get_pods 工具获取 Pod 列表。
    
    注意：此技能为底层原子组件，接收已映射好的 Kubernetes 关键字作为 component 参数。
    不包含用户输入到 k8s 关键字的映射逻辑。
    
    如需处理用户自然语言查询（如 "查询 broker Pod"），
    请使用 resolve_and_get_rocketmq_pods 技能，它包含组件名称映射功能。
    支持的组件关键字：
    - ocloud-tdmq-rocketmq5-namesrv
    - ocloud-tdmq-rocketmq5-broker
    - ocloud-tdmq-rocketmq5-proxy
    - rocketmq-manager
    - rocketmq-billing
    - rocketmq-operation
    - rocketmq-router
    - rocketmq-disperser

  # 输入参数定义：定义该技能需要的输入参数及其类型
  # 注意：参数名必须与底层 Tool (kubectl_get_pods) 的 parameters 严格一致
  input_schema:
    namespace: string              # Kubernetes 命名空间名称
    component_keyword: string      # 组件名字关键字（对齐 Tool required 参数）
    exclude_keywords: string       # （可选）排除关键字，多个用逗号分隔

  # 输出参数定义：定义该技能返回的结果数据结构
  output_schema:
    pods: list                 # Pod 列表，包含每个 Pod 的详细信息
    total: int                 # Pod 总数

  # 执行配置：定义技能的执行步骤
  execution:
    steps:
      # 步骤 ID：唯一标识该执行步骤
      - id: fetch
        # 步骤类型：tool 表示调用外部工具
        type: tool
        description: "调用工具kubectl_get_pods并获取步骤所需数据。"
        # 使用的工具名称：kubectl 获取 Pod 列表
        tool: kubectl_get_pods
        # 传递给工具的输入参数（参数名与 Tool 严格一致）
        input:
          namespace: "{{namespace}}"                  # 命名空间，使用模板变量
          component_keyword: "{{component_keyword}}"  # 组件关键字，使用模板变量
          exclude_keywords: "{{exclude_keywords}}"    # 排除关键字，使用模板变量

  # 信号配置：控制技能的附加行为
  signal:
    # 是否启用置信度评估（false 表示不评估结果的可信程度）
    enable_confidence: false
