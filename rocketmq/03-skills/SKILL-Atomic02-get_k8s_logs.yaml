# 原子技能：查询容器内日志
skill:
  # 技能名称：用于获取容器内的日志内容
  name: get_k8s_logs
  
  # 技能版本号
  version: "1.0"
  
  # 技能类型：atomic 表示原子技能（基础技能，不可再分）
  type: atomic

  # 技能描述：详细说明该技能的功能、支持的组件及日志路径
  description: |
    查询容器组件的日志内容，供sop skill调用

  # 输入参数定义：定义该技能需要的输入参数及其类型
  input_schema:
    namespace: string                 # Kubernetes 命名空间名称
    pod_keyword: string 。            # pod名关键字
    log_paths: list                   # 日志文件路径数组
    log_keywords: list                # 日志搜索关键字数组（用于过滤日志内容）
    exclude_keywords: list            # （可选）需要排除的关键字数组
    lines: number                     # 每个pod返回的日志行数限制

  # 输出参数定义：定义该技能返回的结果数据结构
  output_schema:
    log_content: string               # 查询到的日志内容

  # 执行配置：定义技能的执行步骤
  execution:
    steps:
      # 步骤 ID：唯一标识该执行步骤
      - id: fetch
        # 步骤类型：tool 表示调用外部工具
        type: tool
        description: "调用工具kubectl_query_log并获取步骤所需数据。"
        # 使用的工具名称：kubectl 查询日志
        tool: kubectl_query_log
        # 传递给工具的输入参数
        input:
          namespace: "{{namespace}}"                    # 命名空间，使用模板变量
          pod_keyword: "{{pod_keyword}}"                # 组件关键字，使用模板变量
          log_paths: "{{log_paths}}"                    # 日志路径数组，使用模板变量
          log_keywords: "{{log_keywords}}"              # 日志搜索关键字数组，使用模板变量
          exclude_keywords: "{{exclude_keywords}}"      # 排除关键字数组，使用模板变量
          lines: "{{lines}}"                            # 日志行数，使用模板变量

  # 信号配置：控制技能的附加行为
  signal:
    # 是否启用置信度评估（false 表示不评估结果的可信程度）
    enable_confidence: false
