skill:
  name: check_producer_config
  version: "1.0"
  type: atomic

  description: |
    [内部原子技能] 客户端生产者配置检查。
    基于用户输入文本与日志提取 endpoint、topic、access_key、secret_key、instance_id，
    并调用 tce mysql 工具校验 topic、aksk、instance_id 在控制面数据中是否存在。

  input_schema:
    topic: string
    ak: string
    sk: string
    instance_id: string

  output_schema:
    endpoint: string

    topic: string
    topic_check_result: string

    access_key: string
    secret_key: string
    secret_key_check_result: string

    instance_id: string
    instance_id_check_result: string

    check_result: string # 检查结果汇总

  execution:
    steps:
      - id: check_by_tce_mysql
        type: tool
        description: "调用 tce mysql 校验 topic、aksk、instance_id 是否存在。"
        tool: tce_mysql
        input:
          query: |
            SELECT
              '{{merge_fields.instance_id}}' AS input_instance_id,
              '{{merge_fields.topic}}' AS input_topic,
              '{{merge_fields.access_key}}' AS input_ak,
              CASE WHEN EXISTS (
                SELECT 1 FROM rocketmq_instance WHERE instance_id='{{merge_fields.instance_id}}'
              ) THEN 'YES' ELSE 'NO' END AS instance_exists,
              CASE WHEN EXISTS (
                SELECT 1 FROM rocketmq_topic WHERE instance_id='{{merge_fields.instance_id}}' AND topic='{{merge_fields.topic}}'
              ) THEN 'YES' ELSE 'NO' END AS topic_exists,
              CASE WHEN EXISTS (
                SELECT 1 FROM rocketmq_aksk
                WHERE instance_id='{{merge_fields.instance_id}}'
                  AND access_key='{{merge_fields.access_key}}'
                  AND secret_key='{{merge_fields.secret_key}}'
              ) THEN 'YES' ELSE 'NO' END AS aksk_exists;

      - id: summarize_result
        type: llm
        description: "汇总 mysql 结果，输出生产者配置是否通过。"
        input_from:
          - check_by_tce_mysql.result
          - merge_fields.endpoint
          - merge_fields.topic
          - merge_fields.access_key
          - merge_fields.secret_key
          - merge_fields.instance_id
        prompt: |
          你是 RocketMQ 生产者配置检查助手，只输出 JSON。

          字段：
          endpoint={{endpoint}}
          topic={{topic}}
          access_key={{access_key}}
          secret_key={{secret_key}}
          instance_id={{instance_id}}

          tce mysql 查询结果：
          {{result}}

          输出格式：
          {
            "mysql_check_detail": "mysql 查询摘要",
            "producer_config_status": "通过/不通过",
            "recommendation": "修复建议"
          }
        output_schema:
          mysql_check_detail: string
          producer_config_status: string
          recommendation: string

  signal:
    enable_confidence: false
