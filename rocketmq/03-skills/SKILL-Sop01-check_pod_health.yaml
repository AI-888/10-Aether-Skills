# RocketMQ SOP 技能：检查 Pod 健康状态
skill:
  # 技能名称：用于检查 RocketMQ pod状态并输出异常信息
  name: check_rocketmq_pod_status
  
  # 技能版本号
  version: "2.0"
  
  # 技能类型：sop 表示标准操作流程（由多个步骤组成的复合技能）
  type: sop

  # 技能描述：说明该技能的功能
  description: |
    检查 RocketMQ Pod 健康状态、诊断组件异常、排查进程故障
    
    使用场景：用户询问 "Pod 是否正常"、"Broker 健康检查"、"组件异常排查"、
    "检查 Pod 状态"、"进程是否健康"、"服务是否异常"、"诊断 Pod 故障" 等

  # 输入参数定义：定义该技能需要的输入参数及其类型
  input_schema:
    namespace: string          # Kubernetes 命名空间名称
    component: string          # RocketMQ 组件类型

  # 输出参数定义：定义该技能返回的结果数据结构
  output_schema:
    status: string             # 健康状态（healthy / abnormal）
    abnormal_pods: list        # 异常 Pod 列表，包含异常 Pod 的详细信息
    summary: string            # 检查结果摘要
    confidence: float          # 结果置信度（0-1之间的浮点数）
    need_more_check: boolean   # 是否需要进一步检查

  # 执行步骤（按顺序执行）
  execution:
    steps:

    # 步骤1：获取 Pod 列表
    - id: get_pods
      # 步骤类型：skill 表示调用其他技能
      type: skill
      # 调用的技能名称：获取 RocketMQ Pod 列表
      skill: get_rocketmq_pods
      # 传递给技能的输入参数
      input:
        namespace: "{{namespace}}"
        component: "{{component}}"

    # 步骤2：根据 Pod 状态判断健康情况
    - id: analyze
      # 步骤类型：root_cause_definition 表示确定性规则匹配
      type: root_cause_definition
      # 从上游步骤获取输入数据
      input_from:
        - get_pods.pods
        - get_pods.total

      # 根因判断逻辑：根据 Pod 状态匹配对应的健康状况
      logic:
        # 情况1：存在非 Running 状态的 Pod
        - when:
            status: "!=Running"
          root_cause: "存在异常 Pod，状态不是 Running"
          solution: |
            检查异常 Pod 的事件日志（kubectl describe pod）
            查看容器日志排查启动失败原因
            确认资源配额是否充足

        # 情况2：Pod 数量为 0
        - when:
            total: "0"
          root_cause: "未找到对应的 Pod，组件可能未部署"
          solution: |
            检查 Deployment/StatefulSet 是否存在
            确认命名空间是否正确
            查看组件部署配置

    # 步骤3：生成最终报告
    - id: conclusion
      # 步骤类型：llm 表示使用大语言模型处理
      type: llm
      # 从上游步骤获取输入数据
      input_from:
        - get_pods.pods
        - get_pods.total
        - analyze.root_cause
        - analyze.solution
      # LLM 提示词：生成健康检查报告
      prompt: |
        根据 RocketMQ Pod 健康检查结果生成最终报告。
        
        检查结果:
        - Pod 列表: {{pods}}
        - Pod 总数: {{total}}
        - 根因分析: {{root_cause}}
        - 建议方案: {{solution}}
        
        请输出JSON格式:
        {
          "summary": "问题概述",
          "root_cause": "根本原因分析",
          "recommendation": "修复建议",
          "priority": "处理优先级（高/中/低）"
        }
      # 定义 LLM 输出的数据结构
      output_schema:
        summary: string
        root_cause: string
        recommendation: string
        priority: string

  # 策略配置：定义执行策略
  policy:
    timeout: 5

  # 信号配置：控制技能的附加行为
  signal:
    enable_confidence: true
