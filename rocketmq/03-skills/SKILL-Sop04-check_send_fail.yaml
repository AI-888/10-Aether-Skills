skill:
  name: check_send_fail
  version: "2.0"
  type: sop

  description: |
    排查 RocketMQ 生产/发送消息失败、超时问题。
    将排查过程拆分为 5 个维度：客户端、网络、NameServer、Broker、Topic。
    
    使用场景：
    - 用户反馈发送超时、发送失败、消息投递异常
    - 用户反馈 No route info、topic 不可写、broker busy 等
    - 用户希望获得结构化排查路径和修复优先级

  input_schema:
    param1: {{user_input}} # 用户输入文本
    param2: {{file_path}} # 用户上传日志文件

  output_schema:
    summary: string
    root_cause: string
    recommendation: string
    priority: string
    confidence: float
    need_more_check: boolean

  execution:
    steps:
      - id: extract_context
        type: skill
        description: |
          调用原子技能 extract_mq_fields，从日志文件中提取 RocketMQ 关键字段。
        skill: extract_mq_fields
        input:
          local_file_path: "{{param1}}"

      - id: check_producer_config
        type: skill
        description: |
          调用原子技能 check_producer_config，检查 topic/aksk/instance 配置是否存在。
        skill: check_producer_config
        input:
          user_text: "{{param1}}"
          local_log_path: "{{param2}}"

          endpoint: "{{extract_context.endpoint}}"
          topic: "{{extract_context.topic}}"
          access_key: ""
          secret_key: ""
          instance_id: ""

      - id: check_network
        type: skill
        description: |
          调用原子技能 check_network_from_log，从日志检查网络连接状态。
        skill: check_network_from_log
        input:
          local_log_path: "{{param1}}"
          endpoint: "{{extract_context.endpoint}}"

      - id: check_namesrv
        type: skill
        description: |
          调用原子技能 check_namesrv_connectivity，生成 ping/telnet 命令并分析 namesrv 连通性。
        skill: check_namesrv_connectivity
        input:
          user_text: "{{param1}}"
          local_log_path: "{{param1}}"
          endpoint: "{{extract_context.endpoint}}"

      - id: check_topic_exists
        type: skill
        description: |
          调用原子技能 check_topic_exists，检查 topic 在 broker 中是否存在。
        skill: check_topic_exists
        input:
          user_text: "{{param1}}"
          local_log_path: "{{param1}}"
          topic: "{{extract_context.topic}}"
          instance_id: ""

      - id: check_topic_route
        type: skill
        description: |
          调用原子技能 check_topic_route，检查 topic 路由中的 broker 连接状态。
        skill: check_topic_route
        input:
          user_text: "{{param1}}"
          local_log_path: "{{param1}}"
          topic: "{{extract_context.topic}}"

      - id: check_broker
        type: skill
        description: |
          调用原子技能 check_broker_cluster，检查 broker 集群与 HA 状态。
        skill: check_broker_cluster
        input:
          endpoint: "{{extract_context.endpoint}}"
          nameserver: "{{extract_context.endpoint}}"

      - id: conclusion
        type: llm
        description: |
          "基于输入信息进行智能分析并输出结构化结论。"
        input_from:
          - extract_context.error_logs
          - extract_context.topic
          - extract_context.endpoint
          - check_client.producer_config_status
          - check_client.mysql_check_detail
          - check_client.recommendation
          - check_network.summary
          - check_namesrv.endpoint_connection_status
          - check_namesrv.ping_command
          - check_namesrv.telnet_command
          - check_namesrv.log_evidence
          - check_topic_exists.topic_exists
          - check_topic_exists.check_detail
          - check_topic_exists.recommendation
          - check_topic_route.topic_route_connection_status
          - check_topic_route.route_detail
          - check_topic_route.recommendation
          - check_broker.broker_cluster_status
          - check_broker.cluster_list_result
          - check_broker.ha_list_result
          - check_broker.recommendation
        prompt: |
          根据各维度排查结果，按“故障树优先级”生成最终结论。

          基础信息：
          - 错误日志：{{error_logs}}
          - Topic：{{topic}}
          - 接入点：{{endpoint}}

          客户端生产者配置检查：
          - 状态：{{producer_config_status}}
          - MySQL 校验：{{mysql_check_detail}}
          - 建议：{{check_client.recommendation}}

          网络与 NameServer：
          - 网络总结：{{summary}}
          - NameServer 连通性：{{endpoint_connection_status}}
          - 日志证据：{{log_evidence}}
          - 建议用户执行：{{ping_command}} / {{telnet_command}}

          Topic 检查：
          - Topic 是否存在：{{topic_exists}}
          - Topic 存在性详情：{{check_detail}}
          - Topic 路由状态：{{topic_route_connection_status}}
          - Topic 路由详情：{{route_detail}}
          - Topic 建议：{{check_topic_route.recommendation}}

          Broker 集群：
          - 集群状态：{{broker_cluster_status}}
          - clusterList 摘要：{{cluster_list_result}}
          - ha 摘要：{{ha_list_result}}
          - Broker 建议：{{check_broker.recommendation}}

          输出要求：
          1) 先构建“故障树”并按优先级排序：
             - P0（最高优先级，立即处置）
             - P1（高优先级，短期处置）
             - P2（中低优先级，观察或优化）
          2) 每个节点包含：故障域（客户端/网络/NameServer/Topic/Broker）、证据、结论、处置动作。
          3) root_cause 只保留最可能的单一根因；若并列，给出主根因 + 次根因。
          4) recommendation 必须按“先止血、再修复、后预防”三段输出，且每段按编号列出。

          请只输出 JSON：
          {
            "summary": "故障树摘要（按 P0/P1/P2 列出关键节点）",
            "root_cause": "根本原因（主根因 + 可选次根因）",
            "recommendation": "先止血/再修复/后预防 的分步建议",
            "priority": "最高优先级（高/中/低）"
          }
        output_schema:
          summary: string
          root_cause: string
          recommendation: string
          priority: string

      - id: finalize
        type: python
        description: |
          "对上游输入进行程序化处理并返回结果。"
        input_from:
          - conclusion.summary
          - conclusion.root_cause
          - conclusion.recommendation
          - conclusion.priority
        code: |
          result = {
            "summary": summary,
            "root_cause": root_cause,
            "recommendation": recommendation,
            "priority": priority,
            "confidence": 0.85 if priority == "高" else 0.75,
            "need_more_check": priority == "高"
          }
          return result

  policy:
    timeout: 30

  signal:
    enable_confidence: false