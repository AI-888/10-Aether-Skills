                    const exists = atomicSkills.some(s => s.skill_name === refName);
                    if (!exists) {
                        warnings.push(`步骤 "${step.id}" 引用的原子 Skill "${refName}" 不存在`);
                    }
                }
            });
            if (warnings.length > 0) {
                showNotification(`⚠ 发现 ${warnings.length} 个引用问题:\n${warnings.join('\n')}`, 'error');
            }
        }

        /* ============================
           Atomic 类型隐藏步骤 tab
        ============================ */
        function onTypeChange() {
            const type = document.getElementById('skillType').value;
            const tabSteps = document.getElementById('tabSteps');
            if (type === 'atomic') {
                tabSteps.style.display = 'none';
                // 如果当前在步骤 tab，则切到基本信息
                if (document.getElementById('tab-steps').style.display !== 'none') {
                    switchTab('basic');
                }
            } else {
                tabSteps.style.display = '';
                // 切换到 sop 时，自动补充 conclusion 和 finalize 步骤
                if (type === 'sop') {
                    ensureConclusionAndFinalize();
                }
            }
            parsedData.type = type;
        }

        // 确保 SOP skill 包含 conclusion 和 finalize 步骤
        function ensureConclusionAndFinalize() {
            const hasConclusion = parsedData.steps.some(s => s.id === 'conclusion');
            const hasFinalize = parsedData.steps.some(s => s.id === 'finalize');
            if (!hasConclusion) {
                parsedData.steps.push({
                    id: 'conclusion',
                    type: 'llm',
                    fields: {
                        input_from: [],
                        prompt: '根据前面步骤的执行结果，生成最终分析报告。\n\n请输出JSON格式:\n{\n  "summary": "问题概述",\n  "root_cause": "根本原因分析",\n  "recommendation": "修复建议",\n  "priority": "处理优先级（高/中/低）"\n}',
                        output_schema: [
                            { key: 'summary', value: 'string' },
                            { key: 'root_cause', value: 'string' },
                            { key: 'recommendation', value: 'string' },
                            { key: 'priority', value: 'string' }
                        ]
                    }
                });
            }
            if (!hasFinalize) {
                parsedData.steps.push({
                    id: 'finalize',
                    type: 'python',
                    fields: {
                        input_from: ['conclusion.summary', 'conclusion.root_cause', 'conclusion.recommendation', 'conclusion.priority'],
                        code: 'result = {\n  "summary": summary,\n  "root_cause": root_cause,\n  "recommendation": recommendation,\n  "priority": priority,\n  "confidence": 0.85 if priority == "高" else 0.75,\n  "need_more_check": priority == "高"\n}\nreturn result'
                    }
                });
            }
            renderSteps(parsedData.steps);
        }

        /* ============================
           Tab 切换
        ============================ */
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            // 找到对应 tab 按钮
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => {
                if (t.textContent.includes(tabName === 'basic' ? '基本信息' : tabName === 'steps' ? '执行步骤' : '输入输出')) {
                    t.classList.add('active');
                }
            });
            document.getElementById(`tab-${tabName}`).style.display = 'block';
        }

        /* ============================
           表单 → YAML 同步
        ============================ */
        function syncFormToYaml() {
            // 从表单收集最新数据
            parsedData.name = document.getElementById('skillName').value || 'unnamed_skill';
            parsedData.version = document.getElementById('skillVersion').value || '1.0';
            parsedData.type = document.getElementById('skillType').value;
            parsedData.description = document.getElementById('skillDescription').value;

            let yaml = 'skill:\n';
            yaml += `  name: ${parsedData.name}\n`;
            yaml += `  version: "${parsedData.version}"\n`;
            yaml += `  type: ${parsedData.type}\n\n`;

            // description
            if (parsedData.description) {
                yaml += '  description: |\n';
                parsedData.description.split('\n').forEach(l => yaml += `    ${l}\n`);
                yaml += '\n';
            }

            // input_schema
            if (parsedData.inputSchema.length > 0) {
                yaml += '  input_schema:\n';
                parsedData.inputSchema.forEach(item => {
                    if (!item.key) return;
                    let line = `    ${item.key}: ${item.value || 'string'}`;
                    if (item.comment) line += `   # ${item.comment}`;
                    yaml += line + '\n';
                });
                yaml += '\n';
            }

            // output_schema
            if (parsedData.outputSchema.length > 0) {
                yaml += '  output_schema:\n';
                parsedData.outputSchema.forEach(item => {
                    if (!item.key) return;
                    let line = `    ${item.key}: ${item.value || 'string'}`;
                    if (item.comment) line += `   # ${item.comment}`;
                    yaml += line + '\n';
                });
                yaml += '\n';
            }

            // execution / steps
            if (parsedData.type !== 'atomic' || parsedData.steps.length > 0) {
                yaml += '  execution:\n    steps:\n\n';
                parsedData.steps.forEach(step => {
                    yaml += `      - id: ${step.id}\n`;
                    yaml += `        type: ${step.type}\n`;
                    yaml += serializeStepFields(step);
                    yaml += '\n';
                });
            }

            // policy & signal
            if (parsedData.extra.policy) {
                yaml += '  policy:\n';
                parsedData.extra.policy.split('\n').forEach(l => yaml += `    ${l}\n`);
                yaml += '\n';
            }
            if (parsedData.extra.signal) {
                yaml += '  signal:\n';
                parsedData.extra.signal.split('\n').forEach(l => yaml += `    ${l}\n`);
            }

            document.getElementById('yamlContent').value = yaml;
        }

        function serializeStepFields(step) {
            let yaml = '';
            if (step.description) {
                yaml += '        description: |\n';
                step.description.split('\n').forEach(l => yaml += `          ${l}\n`);
            }
            if (step.type === 'tool' || step.type === 'skill') {

                if (step.fields[step.type]) yaml += `        ${step.type}: ${step.fields[step.type]}\n`;
                const input = step.fields.input || [];
                if (input.length > 0) {
                    yaml += '        input:\n';
                    input.forEach(kv => {
                        if (kv.key) yaml += `          ${kv.key}: "${kv.value}"\n`;
                    });
                }
            } else if (step.type === 'llm') {
                const inputFrom = step.fields.input_from || [];
                if (inputFrom.length > 0) {
                    yaml += '        input_from:\n';
                    inputFrom.forEach(item => yaml += `          - ${item}\n`);
                }
                if (step.fields.prompt) {
                    yaml += '        prompt: |\n';
                    step.fields.prompt.split('\n').forEach(l => yaml += `          ${l}\n`);
                }
                const os = step.fields.output_schema || [];
                if (os.length > 0) {
                    yaml += '        output_schema:\n';
                    os.forEach(kv => {
                        if (kv.key) yaml += `          ${kv.key}: ${kv.value}\n`;
                    });
                }
            } else if (step.type === 'python') {
                const inputFrom = step.fields.input_from || [];
                if (inputFrom.length > 0) {
                    yaml += '        input_from:\n';
                    inputFrom.forEach(item => yaml += `          - ${item}\n`);
                }
                if (step.fields.code) {
                    yaml += '        code: |\n';
                    step.fields.code.split('\n').forEach(l => yaml += `          ${l}\n`);
                }
            } else if (step.type === 'root_cause_definition') {
                const logic = step.fields.logic || [];
                if (logic.length > 0) {
                    yaml += '        logic:\n\n';
                    logic.forEach(rule => {
                        yaml += '          - when:\n';
                        Object.entries(rule.when || {}).forEach(([k, v]) => {
                            yaml += `              ${k}: "${v}"\n`;
                        });
                        if (rule.root_cause) yaml += `            root_cause: "${rule.root_cause}"\n`;
                        if (rule.solution) {
                            yaml += '            solution: |\n';
                            rule.solution.split('\n').forEach(l => yaml += `              ${l}\n`);
                        }
                        yaml += '\n';
                    });
                }
            }
            return yaml;
        }

        /* ============================
           YAML 视图切换
        ============================ */
        function toggleYamlView() {
            isYamlView = !isYamlView;
            if (isYamlView) {
                syncFormToYaml();
                document.getElementById('formEditor').style.display = 'none';
                document.getElementById('yamlEditor').style.display = 'block';
            } else {
                parseYamlToStruct(document.getElementById('yamlContent').value);
                populateForm();
                document.getElementById('formEditor').style.display = 'block';
                document.getElementById('yamlEditor').style.display = 'none';
            }
        }

        /* ============================
           保存 / 删除 / 新建
        ============================ */
        async function saveSkill() {
            if (!currentSkill) return;
            // SOP 类型保存前验证：必须有 conclusion 和 finalize
            if (!isYamlView) {
                const type = document.getElementById('skillType').value;
                if (type === 'sop') {
                    const hasConclusion = parsedData.steps.some(s => s.id === 'conclusion');
                    const hasFinalize = parsedData.steps.some(s => s.id === 'finalize');
                    if (!hasConclusion || !hasFinalize) {
                        showNotification('SOP Skill 必须包含"总结 (conclusion)"和"结束 (finalize)"步骤', 'error');
                        return;
                    }
                }
                syncFormToYaml();
            }
            const content = document.getElementById('yamlContent').value;
            try {
                const resp = await fetch(`${API_BASE}/save`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentSkill.path, content })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                showNotification('保存成功！', 'success');
            } catch (e) {
                showNotification(`保存失败: ${e.message}`, 'error');
            }
        }

        async function deleteSkill() {
            if (!currentSkill) return;
            if (!confirm(`确定要删除 ${currentSkill.name} 吗？`)) return;
            try {
                const resp = await fetch(`${API_BASE}/delete`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentSkill.path })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                showNotification('删除成功！', 'success');
                loadSkills();
                document.getElementById('formEditor').style.display = 'none';
                document.getElementById('toolbar').style.display = 'none';
                document.getElementById('emptyState').style.display = 'flex';
            } catch (e) {
                showNotification(`删除失败: ${e.message}`, 'error');
            }
        }

        function createNewSkill() {
            if (!currentSkillDir) { showNotification('Skill 目录未配置', 'error'); return; }
            const select = document.getElementById('newSkillCategory');
            select.innerHTML = Object.keys(skills).map(c => `<option value="${c}">${c}</option>`).join('');
            const opt = document.createElement('option');
            opt.value = '__new__'; opt.textContent = '+ 新建目录';
            select.appendChild(opt);
            document.getElementById('newSkillFilename').value = 'SKILL-new_skill.yaml';
            document.getElementById('newSkillModal').style.display = 'flex';
        }

        function closeNewSkillModal() {
            document.getElementById('newSkillModal').style.display = 'none';
        }

        async function confirmNewSkill() {
            let category = document.getElementById('newSkillCategory').value;
            const filename = document.getElementById('newSkillFilename').value;
            if (!filename.endsWith('.yaml') && !filename.endsWith('.yml')) {
                showNotification('文件名必须以 .yaml 或 .yml 结尾', 'error'); return;
            }
            if (category === '__new__') {
                const newDir = prompt('请输入新目录名称:');
                if (!newDir) return;
                category = newDir;
            }
            const skillName = filename.replace(/\.(yaml|yml)$/, '').replace('SKILL-', '');
            const newSkillType = document.getElementById('newSkillType').value;
            let template;
            if (newSkillType === 'sop') {
                template = `skill:\n  name: ${skillName}\n  version: "1.0"\n  type: sop\n\n  description: |\n    描述该 Skill 的功能\n\n  input_schema:\n    param1: string\n\n  output_schema:\n    result: string\n\n  execution:\n    steps:\n\n      - id: step_1\n        type: skill\n        skill: ""\n        input:\n          param1: "{{param1}}"\n\n      - id: conclusion\n        type: llm\n        input_from:\n          - step_1\n\n        prompt: |\n          根据前面步骤的执行结果，生成最终分析报告。\n\n          请输出JSON格式:\n          {\n            "summary": "问题概述",\n            "root_cause": "根本原因分析",\n            "recommendation": "修复建议",\n            "priority": "处理优先级（高/中/低）"\n          }\n\n        output_schema:\n          summary: string\n          root_cause: string\n          recommendation: string\n          priority: string\n\n      - id: finalize\n        type: python\n        input_from:\n          - conclusion.summary\n          - conclusion.root_cause\n          - conclusion.recommendation\n          - conclusion.priority\n\n        code: |\n          result = {\n            "summary": summary,\n            "root_cause": root_cause,\n            "recommendation": recommendation,\n            "priority": priority,\n            "confidence": 0.85 if priority == "高" else 0.75,\n            "need_more_check": priority == "高"\n          }\n          return result\n`;
            } else {
                template = `skill:\n  name: ${skillName}\n  version: "1.0"\n  type: ${newSkillType}\n\n  description: |\n    描述该 Skill 的功能\n\n  input_schema:\n    param1: string\n\n  output_schema:\n    result: string\n`;
            }
            const filePath = category ? `${category}/${filename}` : filename;
            try {
                const resp = await fetch(`${API_BASE}/create`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dir: currentSkillDir, path: filePath, content: template })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                closeNewSkillModal();
                showNotification('创建成功！', 'success');
                loadSkills();
            } catch (e) {
                showNotification(`创建失败: ${e.message}`, 'error');
            }
        }

        /* ============================
           工具函数
        ============================ */
        function showNotification(message, type = 'success') {
            const el = document.createElement('div');
            el.className = `notification ${type}`;
            el.textContent = message;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
